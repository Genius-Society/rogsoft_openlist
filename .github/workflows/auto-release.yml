name: Auto Release

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 19 * * *" # 每天 UTC 时间 19:00 (北京时间 3:00~4:15) 触发一次

  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  job-on-schedule:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5
      # Step 2: 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.GIT_NAME }}"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
      # Step 3: 发布至 GitHub
      - name: Check Binary Update
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          python ./build.py
          VERSION=$(cat ./*/version)
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git add .
            git commit -m "Upd ver to $VERSION at $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            python ./.github/release.py --ver "$VERSION" --token "$GIT_TOKEN"
          else
            diff_days=$(curl -s https://api.github.com/repos/Genius-Society/rogsoft_openlist/releases/latest | python3 -c "import sys,json,datetime;d=json.load(sys.stdin);p=datetime.datetime.strptime(d['published_at'],'%Y-%m-%dT%H:%M:%SZ').replace(tzinfo=datetime.timezone.utc);print((datetime.datetime.now(datetime.timezone.utc)-p).days)")
            if [ "$diff_days" -gt 58 ]; then
              python ./.github/release.py --ver "$VERSION" --token "$GIT_TOKEN"
              echo "Avoid 60-day cron sleep: force-release regularly"
            else
              echo "Files are the same, no changes."
            fi
          fi

  job-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Step 1: 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v5
      # Step 2: 配置 Git
      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.GIT_NAME }}"
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
      # Step 3: 发布至 GitHub
      - name: Update Release
        env:
          GIT_EMAIL: ${{ secrets.GIT_EMAIL }}
          SF_PASS: ${{ secrets.SF_PASS }}
        run: |
          python ./build.py
          VERSION=$(cat ./*/version)
          if [ -n "$(git status --porcelain)" ]; then
            echo "Files are different, committing changes..."
            git add .
            git commit -m "Upd ver to $VERSION at $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "Files are the same, no changes."
          fi
          python ./.github/release.py --ver "$VERSION" --token "$GIT_TOKEN"
          mkdir v"$VERSION"
          mv openlist.tar.gz ./v"$VERSION"
          sshpass -p "$SF_PASS" rsync -avz -e "ssh -o StrictHostKeyChecking=no" LICENSE README.md v"$VERSION" genius-society@frs.sourceforge.net:/home/frs/project/rogsoft-openlist/
